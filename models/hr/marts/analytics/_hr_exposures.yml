version: 2

exposures:

  - name: workforce_headcount_dashboard

    type: dashboard
    maturity: medium

    url: https://company-bi-tool/workforce-headcount-dashboard

    owner:
      name: Workforce Analytics Team
      email: workforce_analytics@company.com

    depends_on:
      - ref('dim_employee_current')
      - ref('fct_employee_history')

    config:
      meta:
        owner_team: workforce_analytics
        domain: hr
        pii_contains_sensitive_employee_data: false

      tags:
        - hr
        - workforce
        - executive_reporting

    description: >
      Executive workforce dashboard used to monitor historical headcount,
      employee movement, organizational changes, and workforce trends
      across departments and divisions.