version: 2

models:
  - name: dim_employee
    description: Core employee dimension table. One record per employee

    columns:
      - name: employee_id
        tests: [not_null, unique]

  - name: dim_date
    description: Calendar date dimension used across HR fact models.

    columns:
      - name: date_key
        tests:
          - not_null
          - unique

      - name: calendar_date
        tests:
          - not_null
          - unique

  - name: fct_recruitment_incremental
    description: 
      Grain 1 row per applicant application. 
      Incremental fact model capturing recruitment lifecycle events.
      This model was implemented as incremental to reduce warehouse
      compute costs and improve pipeline runtime as employee event
      volumes scale.

      A 3-day lookback window is used to capture late-arriving records.
      The model uses Snowflake merge strategy to support updates to
      existing employee event records.
      Assumptions
      - application_date is reliably populated by the source system
      - applicant_id is unique across all source loads
      - late-arriving records typically arrive within 3 days
    columns:
      - name: applicant_id
        description: Unique identifier for each applicant
        tests: [not_null, unique]
      - name: application_date
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: calendar_date