version: 2

sources:
  - name: hr
    database: raw
    schema: hr

    tables:
      - name: employee
        config:
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 48, period: hour}

          loaded_at_field: _loaded_at

        description: >
          Raw employee workforce extract sourced from the HRIS system.
          Contains employee demographic, organizational, and employment attributes.
          Data is refreshed daily through scheduled ingestion pipelines.

        columns:
          - name: emp_id
            description: Unique identifier for each employee.
            tests: 
              - not_null
              - unique
          - name: employee_status
            description: Current employment status of the employee. Used to segment active workforce, attrition analysis, and leave tracking.
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: "{{ var('employee_status_values') }}"
          - name: start_date
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  arguments:
                    expression: "<= current_date"
          - name: ad_email
            tests:
              - not_null
              
      - name: recruitment
        columns:
          - name: applicant_id
            tests:
              - not_null
              - unique
          - name: application_date
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  arguments:
                    expression: "<= current_date"
          - name: email
            tests:
              - not_null
          - name: status
     
      - name: training_and_development
        columns:
          - name: employee_id
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('hr', 'employee')
                    field: emp_id
          - name: training_date
          - name: training_program_name
            tests:
              - accepted_values:
                  arguments:
                    values: "{{ var('training_program_name_values') }}"
          - name: training_type
          - name: training_outcome
            tests:
              - accepted_values:
                  arguments:
                    values: "{{ var('training_outcome_values') }}"
          - name: training_cost
            tests:
              - dbt_utils.expression_is_true:
                  arguments:
                    expression: ">= 0"
      
      - name: employee_engagement_survey
        columns: 
          - name: employee_id
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('hr', 'employee')
                    field: emp_id