version: 2

sources:
  - name: hr
    database: raw
    schema: hr

    tables:
      - name: employee
        columns:
          - name: emp_id
            tests: 
              - not_null
              - unique
          - name: first_name
            tests: 
              - not_null
          - name: last_name
            tests: 
              - not_null
          - name: employee_status
            tests:
              - not_null
              - accepted_values:
                  values: ['Active', 'Future Start', 'Voluntarily Terminated', 'Leave of Absence', 'Terminated for Cause']
          - name: start_date
            tests:
              - not_null
              
      - name: recruitment
      - name: training_and_development
      - name: employee_engagement_survey