name: dbt CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-snowflake

      - name: Install dependencies
        run: |
          dbt deps
      - name: Create Snowflake private key
        run: |
          mkdir -p /home/runner/.dbt

          printf '%s' "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /home/runner/.dbt/rsa_key.p8

          chmod 600 /home/runner/.dbt/rsa_key.p8

          ls -la /home/runner/.dbt
          default:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                schema: ${{ secrets.SNOWFLAKE_SCHEMA }}
                threads: 4
                private_key_path: /home/runner/.dbt/rsa_key.p8
                private_key_passphrase: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
          EOF

      - name: Validate project (parse)
        run: |
          dbt parse

      - name: Run tests
        run: |
          dbt test